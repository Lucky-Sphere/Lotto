<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Sphere Lotto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { background: #0f0f1a; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #cfd8e3; }
  .sidebar { background: #14142b; min-height: 100vh; }
  .sidebar .nav-link { color: #8892a8; border-left: 3px solid transparent; border-radius: 0; font-size: .95rem; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #e8edf5; background: rgba(255,255,255,.06); }
  .sidebar .nav-link.active { border-left-color: #f5b342; }
  .draw-card { cursor: pointer; transition: box-shadow .15s; background: #1a1a30; border: 1px solid #252545; color: #cfd8e3; }
  .draw-card:hover { box-shadow: 0 .25rem .75rem rgba(0,0,0,.3) !important; border-color: #3a3a5c; }
  .draw-card .collapse-icon { transition: transform .2s; }
  .draw-card:not(.collapsed) .collapse-icon { transform: rotate(180deg); }
  .tier-row { border-radius: 6px; }
  .tier-row:nth-child(odd) { background: rgba(255,255,255,.035); }
  .num-cell { font-family: 'Inter', 'Courier New', monospace; letter-spacing: 1px; color: #f5b342; }
  .jp-badge { background: rgba(245, 179, 66, .12); }
  .game-box { background: #1e1e36; border: 1px solid #2a2a48; border-radius: 8px; }
  .card-header-bg { background: rgba(255,255,255,.03); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #14142b; }
  ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }
  @media (max-width: 767.98px) {
    .sidebar { min-height: auto; }
  }
</style>
</head>
<body>
<div class="container-fluid g-0">
  <div class="row g-0">
    <aside class="col-md-3 col-lg-2 sidebar p-3" id="sidebar">
      <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom border-secondary">
        <h1 class="h5 text-white mb-0"><i class="bi bi-trophy-fill text-warning me-2"></i>Lucky Sphere Lotto</h1>
        <button class="btn btn-sm btn-outline-light border-0 d-md-none" onclick="toggleSidebar()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <nav class="nav flex-column">
        <a class="nav-link py-2 px-3 active" href="#" onclick="return showDashboard()" id="nav-dashboard">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
        <div class="nav-sub-header mt-2 mb-1 px-3"><small class="text-secondary text-uppercase fw-semibold" style="font-size:11px;letter-spacing:1px;">Operators</small></div>
        <div id="operator-list"></div>
        <a class="nav-link py-2 px-3" href="#" onclick="return showSearch()" id="nav-search">
          <i class="bi bi-search me-2"></i>Search
        </a>
        <hr class="my-2 border-secondary mx-3">
        <a class="nav-link py-2 px-3" href="#" onclick="return showSettings()" id="nav-settings">
          <i class="bi bi-gear me-2"></i>Settings
        </a>
      </nav>
    </aside>
    <main class="col-md-9 col-lg-10 p-3 p-md-4" id="main-content">
      <div class="d-flex align-items-center mb-3 d-md-none">
        <button class="btn btn-outline-secondary btn-sm me-2" onclick="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <span class="fw-semibold text-light" id="mobile-title">Lucky Sphere Lotto</span>
      </div>
      <div id="content">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border text-secondary mb-2" role="status"></div>
          <p class="mb-0">Loading...</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
const api = async url => { const r = await fetch(url); if (!r.ok) throw Error(await r.text()); return r.json(); };

let operators = [];
let currentOpId = null;
let currentView = 'dashboard';
let currentPage = 1;
let currentFilterFrom = null;
let currentFilterTo = null;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('d-none');
}

function showLoading(container) {
  container.innerHTML = `<div class="text-center py-5 text-muted"><div class="spinner-border text-secondary mb-2" role="status"></div><p class="mb-0">Loading...</p></div>`;
}

function setNavActive(id) {
  document.querySelectorAll('#sidebar .nav-link').forEach(l => l.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function showDashboard() {
  currentView = 'dashboard';
  currentOpId = null;
  setNavActive('nav-dashboard');
  if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('d-none');
  renderDashboard();
  return false;
}

function showSettings() {
  currentView = 'settings';
  currentOpId = null;
  setNavActive('nav-settings');
  if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('d-none');
  renderSettings();
  return false;
}

async function renderDashboard() {
  const content = document.getElementById('content');
  document.getElementById('mobile-title').textContent = 'Dashboard';
  content.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-3">
      <h2 class="h4 mb-0"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h2>
    </div>
    <div id="dashboard-content"></div>`;
  showLoading(document.getElementById('dashboard-content'));
  try {
    const data = await api('/api/dashboard');
    const cont = document.getElementById('dashboard-content');
    cont.innerHTML = `
      <div class="row g-3" id="op-cards">
        ${data.operators.map(op => {
          const g = op.latestDraw && (op.latestDraw.games || []).find(x => /4d|1\+3d/i.test(x.game_name) && !/jackpot/i.test(x.game_name));
          const top3 = g ? ['1st Prize','2nd Prize','3rd Prize'].map(t => {
            const r = g.results.find(x => x.prize_tier === t);
            return r ? (r.numbers||[]).join('') : null;
          }).filter(Boolean) : [];
          const jp1 = op.latestDraw && (op.latestDraw.games||[]).find(x => /jackpot\s*1/i.test(x.game_name));
          const jp2 = op.latestDraw && (op.latestDraw.games||[]).find(x => /jackpot\s*2/i.test(x.game_name));
          const dt = op.latestDraw ? new Date(op.latestDraw.draw_date) : null;
          const dateStr = dt ? dt.toLocaleDateString('en-MY', { weekday:'short', year:'numeric', month:'short', day:'numeric' }) : '';
          return `<div class="col-12">
            <div class="card draw-card border-0 p-4 h-100" onclick="return selectOperator(${op.id})" style="cursor:pointer;">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h4 class="mb-0 fw-bold">${op.name}</h4>
                <a href="${op.website_url}" target="_blank" class="text-muted" title="Visit website"><i class="bi bi-box-arrow-up-right"></i></a>
              </div>
              ${op.latestDraw ? `<div class="mb-2"><span class="fw-medium fs-6">${dateStr}</span>${op.latestDraw.draw_label ? ` <span class="badge bg-info bg-opacity-10 text-info-emphasis fs-6">#${op.latestDraw.draw_label}</span>` : ''}</div>` : '<div class="text-muted mb-2">No draws yet</div>'}
              ${top3.length ? `<div class="num-cell fw-medium mb-2" style="font-size:1.4rem">${top3.join(' · ')}</div>` : ''}
              <div class="fs-6">
                ${jp1 ? `<span class="text-warning-emphasis fw-medium"><i class="bi bi-trophy-fill"></i> ${parseFloat(jp1.results[0].prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</span>` : ''}
                ${jp2 ? `<span class="text-warning-emphasis fw-medium ms-3"><i class="bi bi-trophy-fill text-secondary"></i> ${parseFloat(jp2.results[0].prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</span>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } catch (e) {
    document.getElementById('dashboard-content').innerHTML =
      `<div class="text-center py-5 text-muted"><i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i><p class="mb-0">Failed to load dashboard</p><small>${e.message}</small></div>`;
  }
}

async function renderSettings() {
  const content = document.getElementById('content');
  document.getElementById('mobile-title').textContent = 'Settings';
  content.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-3">
      <h2 class="h4 mb-0"><i class="bi bi-gear me-2"></i>Settings</h2>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card draw-card border-0">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-clock fs-4 text-warning"></i>
              <h5 class="card-title mb-0">Midnight Scrape</h5>
            </div>
            <p class="small text-muted mb-0">Fetches the latest results from all 3 operators every night at midnight.</p>
            <pre class="small mt-2 mb-0 p-2 rounded" style="background:#1e1e36;color:#a8c8e8;overflow-x:auto;user-select:all;">0 0 * * * cd /var/www/html/lotto && bash cron_midnight.sh</pre>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card draw-card border-0">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-arrow-repeat fs-4 text-info"></i>
              <h5 class="card-title mb-0">Historical Backfill</h5>
            </div>
            <p class="small text-muted mb-0">Every 30 minutes, goes back <strong>1 day</strong> further into history per operator until <strong>1960</strong>.</p>
            <pre class="small mt-2 mb-0 p-2 rounded" style="background:#1e1e36;color:#a8c8e8;overflow-x:auto;user-select:all;">*/30 * * * * cd /var/www/html/lotto && bash cron_backfill.sh</pre>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="card draw-card border-0">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-activity fs-4 text-success"></i>
              <h5 class="card-title mb-0">Backfill Progress</h5>
            </div>
            <div id="backfill-state" class="small text-muted py-3 text-center">Loading...</div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card draw-card border-0">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-info-circle fs-4 text-secondary"></i>
              <h5 class="card-title mb-0">State File</h5>
            </div>
            <p class="small text-muted mb-0">Progress is tracked in <code class="text-info">backfill_state.json</code>. Each operator has its own <code>nextDate</code> and <code>complete</code> flag. Once 1960 is reached, backfill marks itself done.</p>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card draw-card border-0">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-journal-text fs-4 text-warning"></i>
              <h5 class="card-title mb-0">Logs</h5>
            </div>
            <pre class="small mb-0 p-2 rounded" style="background:#1e1e36;color:#a8c8e8;max-height:160px;overflow-y:auto;">
logs/midnight.log
logs/backfill.log</pre>
          </div>
        </div>
      </div>
    </div>`;
  try {
    const state = await api('/api/settings');
    const el = document.getElementById('backfill-state');
    const keys = Object.keys(state);
    if (!keys.length) {
      el.innerHTML = `<span class="text-muted">No backfill state yet — runs on the next cron cycle.</span>`;
    } else {
      el.innerHTML = `<div class="row g-2">${keys.map(k => {
        const s = state[k];
        const pct = s.complete ? 100 : 0;
        const status = s.complete
          ? '<span class="text-success fw-medium"><i class="bi bi-check-circle-fill"></i> Complete</span>'
          : `<span class="text-info fw-medium"><i class="bi bi-arrow-right-circle-fill"></i> In progress</span>`;
        return `<div class="col-md-4">
          <div class="p-2 rounded" style="background:#1e1e36;">
            <div class="fw-medium mb-1">${k}</div>
            <div class="small">${status}</div>
            <div class="small text-muted">Next: ${s.nextDate || '—'}</div>
            <div class="progress mt-1" style="height:4px;">
              <div class="progress-bar bg-info" style="width:${pct}%"></div>
            </div>
          </div>
        </div>`;
      }).join('')}</div>`;
    }
  } catch {
    document.getElementById('backfill-state').innerHTML = `<span class="text-muted">Could not load state.</span>`;
  }
}

function showSearch() {
  currentView = 'search';
  currentOpId = null;
  setNavActive('nav-search');
  if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('d-none');
  renderSearch();
  return false;
}

function renderSearch() {
  const content = document.getElementById('content');
  document.getElementById('mobile-title').textContent = 'Search';
  content.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-3">
      <h2 class="h4 mb-0"><i class="bi bi-search me-2"></i>Search 4D Numbers</h2>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-8">
        <input type="text" class="form-control" id="search-input" placeholder="Enter 4-digit numbers, e.g. 1234, 5678, 9012" style="background:#1e1e36;border:1px solid #2a2a48;color:#cfd8e3;">
      </div>
      <div class="col-md-2">
        <button class="btn btn-info w-100" onclick="doSearch()"><i class="bi bi-search"></i> Search</button>
      </div>
    </div>
    <div id="search-results"></div>`;
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

async function doSearch() {
  const input = document.getElementById('search-input').value.trim();
  if (!input) return;
  const nums = input.split(/[,\s]+/).filter(s => /^\d{4}$/.test(s));
  if (!nums.length) {
    document.getElementById('search-results').innerHTML = '<div class="text-muted text-center py-3">No valid 4-digit numbers found.</div>';
    return;
  }
  const el = document.getElementById('search-results');
  el.innerHTML = `<div class="text-center py-5 text-muted"><div class="spinner-border text-secondary mb-2" role="status"></div><p class="mb-0">Searching ${nums.length} number(s)...</p></div>`;
  try {
    const results = await api(`/api/search?numbers=${encodeURIComponent(nums.join(','))}`);
    if (!results.length) {
      el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i><p class="mb-0">No matches found for the given numbers.</p></div>`;
      return;
    }
    const grouped = {};
    results.forEach(r => {
      const key = `${r.operator_name}||${r.draw_date}`;
      if (!grouped[key]) grouped[key] = { operator: r.operator_name, date: r.draw_date, label: r.draw_label, hits: [] };
      grouped[key].hits.push(r);
    });
    el.innerHTML = `<p class="text-muted small mb-2">${results.length} match(es) for ${nums.length} number(s)</p>
      ${Object.values(grouped).map(g => {
        const dt = new Date(g.date);
        const dateStr = dt.toLocaleDateString('en-MY', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
        return `<div class="card draw-card border-0 mb-2">
          <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
              <span class="fw-semibold">${g.operator}</span>
              <span class="small text-muted">${dateStr}</span>
              ${g.label ? `<span class="badge bg-info bg-opacity-10 text-info-emphasis">#${g.label}</span>` : ''}
            </div>
            ${g.hits.map(h => {
              const numsStr = (h.numbers||[]).filter(n => nums.includes(n)).join(', ');
              const amt = h.prize_amount ? `${parseFloat(h.prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}` : '';
              return `<div class="row g-1 tier-row align-items-center py-1 px-2 rounded">
                <div class="col-4 col-sm-3"><small class="text-muted">${h.game_name}</small></div>
                <div class="col-3 col-sm-4"><small class="num-cell fw-medium">${numsStr}</small></div>
                <div class="col-3 col-sm-3"><small>${h.prize_tier}</small></div>
                <div class="col-2 col-sm-2 text-end"><small class="${h.prize_amount ? 'text-warning-emphasis fw-medium' : 'text-muted'}">${amt}</small></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}`;
  } catch (e) {
    el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i><p class="mb-0">Search failed</p><small>${e.message}</small></div>`;
  }
}

async function loadOperators() {
  operators = await api('/api/operators');
  const nav = document.getElementById('operator-list');
  nav.innerHTML = operators.map(o =>
    `<a class="nav-link py-2 px-3 ps-4" href="#" data-id="${o.id}" onclick="return selectOperator(${o.id})" id="nav-op-${o.id}">
      <i class="bi bi-building me-2"></i>${o.name}
      <span class="badge bg-secondary rounded-pill float-end">${o.draw_count}</span>
    </a>`
  ).join('');
  showDashboard();
}

async function loadDraws(id, from, to, page) {
  const params = new URLSearchParams();
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  params.set('page', page || 1);
  const qs = params.toString();
  const url = `/api/operators/${id}/draws${qs ? '?' + qs : ''}`;
  const el = document.getElementById('draws');
  showLoading(el);
  try {
    const data = await api(url);
    currentPage = data.page;
    renderDraws(data);
  } catch (e) {
    el.innerHTML =
      `<div class="text-center py-5 text-muted"><i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i><p class="mb-0">Failed to load draws</p><small>${e.message}</small></div>`;
  }
}

async function selectOperator(id) {
  currentOpId = id;
  currentView = 'operator';
  currentPage = 1;
  currentFilterFrom = null;
  currentFilterTo = null;
  setNavActive('nav-op-' + id);
  const op = operators.find(o => o.id === id);
  const content = document.getElementById('content');
  document.getElementById('mobile-title').textContent = op.name;
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth < 768) sidebar.classList.add('d-none');

  content.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-1">
      <h2 class="h4 mb-0">${op.name}</h2>
      <a href="${op.website_url}" target="_blank" class="btn btn-sm btn-outline-secondary" title="Visit website"><i class="bi bi-box-arrow-up-right"></i></a>
    </div>
    <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
      <div><input type="text" class="form-control form-control-sm" style="width:220px;background:#1e1e36;border:1px solid #2a2a48;color:#cfd8e3;" id="date-range" placeholder="Select date range..."></div>
      <button class="btn btn-sm btn-outline-secondary" onclick="clearDateFilter()"><i class="bi bi-x"></i> Clear</button>
    </div>
    <div id="draws"></div>`;
  flatpickr("#date-range", {
    mode: "range",
    dateFormat: "Y-m-d",
    maxDate: "today",
    defaultDate: ["today", "today"],
    onChange: function(selectedDates) {
      if (selectedDates.length === 2) {
        currentFilterFrom = flatpickr.formatDate(selectedDates[0], "Y-m-d");
        currentFilterTo = flatpickr.formatDate(selectedDates[1], "Y-m-d");
        currentPage = 1;
        loadDraws(id, currentFilterFrom, currentFilterTo, 1);
      }
    }
  });
  loadDraws(id, null, null, 1);
  return false;
}

function clearDateFilter() {
  const fp = document.getElementById('date-range')?._flatpickr;
  if (fp) fp.clear();
  currentFilterFrom = null;
  currentFilterTo = null;
  currentPage = 1;
  loadDraws(currentOpId, null, null, 1);
}

function renderDraws(data) {
  const container = document.getElementById('draws');
  const { draws, page, totalPages, total } = data;
  if (!draws.length) {
    container.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i><p class="mb-0">No draws yet</p></div>`;
    return;
  }
  container.innerHTML = draws.map(d => {
    const dt = new Date(d.draw_date);
    const dateStr = dt.toLocaleDateString('en-MY', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const games = (d.games || []).filter(g => g.results && g.results.length && !/^3D Jackpot$|^3\+3D /i.test(g.game_name));
    const top3 = quickGlance(games);
    return `
      <div class="card draw-card border-0 shadow-sm mb-3" data-bs-toggle="collapse" data-bs-target="#draw-${d.id}">
        <div class="card-body py-3">
          <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="fw-semibold">${dateStr}</span>
              ${d.draw_label ? `<span class="badge bg-info bg-opacity-10 text-info-emphasis"><i class="bi bi-hash me-1"></i>${d.draw_label}</span>` : ''}
            </div>
            <div class="d-flex align-items-center gap-2 text-muted small">
              <i class="bi bi-chevron-down collapse-icon"></i>
            </div>
          </div>
          ${top3 ? `<div class="mt-2 small text-muted">${top3}</div>` : ''}
          <div class="collapse mt-3 border-top border-secondary pt-3" id="draw-${d.id}">
            ${renderGames(games)}
          </div>
        </div>
      </div>`;
  }).join('');

  if (totalPages > 1) {
    const range = [];
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - page) <= 2) {
        range.push(i);
      } else if (range[range.length - 1] !== '...') {
        range.push('...');
      }
    }
    container.innerHTML += `
      <div class="d-flex justify-content-between align-items-center mt-3 mb-2 flex-wrap gap-2">
        <small class="text-muted">Page ${page} of ${totalPages} (${total} draws)</small>
        <div class="d-flex gap-1">
          ${page > 1 ? `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(${page - 1})"><i class="bi bi-chevron-left"></i></button>` : ''}
          ${range.map(p => p === '...' ? '<span class="btn btn-sm btn-outline-secondary disabled">...</span>'
            : `<button class="btn btn-sm ${p === page ? 'btn-info' : 'btn-outline-secondary'}" onclick="goPage(${p})">${p}</button>`
          ).join('')}
          ${page < totalPages ? `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(${page + 1})"><i class="bi bi-chevron-right"></i></button>` : ''}
        </div>
      </div>`;
  }
}

function goPage(p) {
  currentPage = p;
  loadDraws(currentOpId, currentFilterFrom, currentFilterTo, p);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function quickGlance(games) {
  const g = games.find(x => (/4d/i.test(x.game_name) || /1\+3d/i.test(x.game_name)) && !/jackpot/i.test(x.game_name));
  if (!g) return '';
  const top3 = ['1st Prize', '2nd Prize', '3rd Prize'].map(t => {
    const r = g.results.find(x => x.prize_tier === t);
    return r ? (r.numbers || []).join('') : null;
  }).filter(Boolean);
  if (!top3.length) return '';
  const jp1 = games.find(x => /jackpot\s*1/i.test(x.game_name) && x.results[0]?.prize_amount);
  const jp2 = games.find(x => /jackpot\s*2/i.test(x.game_name) && x.results[0]?.prize_amount);
  let html = `<span class="num-cell fw-medium">${top3.join(' &nbsp;|&nbsp; ')}</span>`;
  if (jp1) html += ` &nbsp;·&nbsp; <span class="text-warning-emphasis fw-medium"><i class="bi bi-trophy-fill"></i> ${parseFloat(jp1.results[0].prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</span>`;
  if (jp2) html += ` &nbsp;·&nbsp; <span class="text-warning-emphasis fw-medium"><i class="bi bi-trophy-fill text-secondary"></i> ${parseFloat(jp2.results[0].prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</span>`;
  return html;
}

function renderGames(games) {
  if (!games || !games.length) return '<p class="text-muted text-center py-2 mb-0">No results</p>';
  return games.map(g => {
    const isJp = /jackpot/i.test(g.game_name);
    const tiers = g.results.map(r => {
      const nums = (r.numbers || []).join(' <span class="text-muted mx-1">·</span> ');
      const amt = r.prize_amount ? `${parseFloat(r.prize_amount).toLocaleString('en-MY', {minimumFractionDigits:2})}` : '';
      const isJpTier = /jackpot/i.test(r.prize_tier);
      return `<div class="row g-1 tier-row align-items-center py-1 px-2 rounded ${isJpTier ? 'jp-badge' : ''}">
        <div class="col-12 col-sm-4 col-md-3"><small class="fw-medium">${r.prize_tier}</small></div>
        <div class="col-8 col-sm-5 col-md-6"><small class="num-cell">${nums}</small></div>
        <div class="col-4 col-sm-3 col-md-3 text-end"><small class="fw-medium ${isJpTier ? 'text-warning-emphasis' : 'text-success'}">${amt}</small></div>
      </div>`;
    }).join('');
    return `<div class="mb-3">
      <h6 class="fw-semibold mb-2">
        ${isJp ? '<i class="bi bi-trophy-fill text-warning me-1"></i>' : '<i class="bi bi-grid-fill text-secondary me-1"></i>'}
        ${g.game_name}
      </h6>
      <div class="game-box p-2">${tiers}</div>
    </div>`;
  }).join('');
}

loadOperators();
</script>
</body>
</html>
